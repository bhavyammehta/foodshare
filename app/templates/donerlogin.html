{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donor Login | FoodShare</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif
}
body{
    margin:0;
    min-height:100vh;
    background: url('https://images.unsplash.com/photo-1488521787991-ed7bbaae773c') no-repeat center/cover;
    display:flex;
    align-items:center;
    justify-content:center
}
.container{
    width:900px;
    height:500px;
    background:#fff;
    border-radius:16px;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
    display:flex;
    overflow:hidden
}
.left{
    width:50%;
    background:url("https://images.unsplash.com/photo-1606787366850-de6330128bfc");
    background-size:cover;
    color:#fff;
    position:relative
}
.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.6);
    padding:40px;
    display:flex;
    flex-direction:column;
    justify-content:center
}
.right{
    width:50%;
    padding:40px
}
.logo{
    font-size:26px;
    font-weight:bold;
    color:#2ecc71;
    text-align:center
}
.role{
    text-align:center;
    margin-bottom:20px;
}
input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
}
button{
    width:100%;
    padding:12px;
    background:#2ecc71;
    border:none;
    color:#fff;
    cursor:pointer;
}
.error{
    color:red;
    text-align:center;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT SIDE -->
<div class="left">
    <div class="overlay">
        <h2>Welcome Back ❤️</h2>
        <p>Login to donate food</p>
    </div>
</div>

<!-- RIGHT SIDE -->
<div class="right">

<div class="logo">FoodShare</div>
<div class="role">Donor Login</div>

<!--  ERROR MESSAGE -->
{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Login</button>
</form>

<p style="text-align:center;">
New user? <a href="/donor-register/">Register</a>
</p>

</div>

</div>

</body>
</html>
